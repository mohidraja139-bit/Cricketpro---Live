<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results - CricketPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00d4ff;
            --success: #00c851;
            --dark: #0a0a0a;
            --card-bg: #111111;
            --card-border: #222222;
            --text: #ffffff;
            --text-secondary: #888888;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: var(--text);
            line-height: 1.6;
        }
        .navbar {
            background: rgba(17, 17, 17, 0.95);
            border-bottom: 1px solid var(--card-border);
            padding: 15px 20px;
        }
        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text);
            font-size: 20px;
            font-weight: 800;
        }
        .logo i {
            color: var(--primary);
        }
        .nav-links {
            display: flex;
            list-style: none;
            gap: 20px;
        }
        .nav-links a {
            text-decoration: none;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 14px;
        }
        .nav-links a.active {
            color: var(--primary);
        }
        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        .page-header {
            margin-bottom: 30px;
        }
        .page-header h1 {
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .matches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        .match-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 20px;
        }
        .match-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 12px;
            color: var(--text-secondary);
        }
        .match-type {
            background: rgba(0, 212, 255, 0.1);
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 15px;
            font-weight: 600;
        }
        .match-teams {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        .team {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }
        .team-second {
            flex-direction: row-reverse;
            text-align: right;
        }
        .team-logo {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--card-border);
            background: white;
        }
        .team-info h3 {
            font-size: 16px;
            font-weight: 700;
        }
        .score {
            font-size: 18px;
            font-weight: 800;
            color: var(--primary);
        }
        .vs-divider {
            width: 40px;
            height: 40px;
            background: var(--card-border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-secondary);
        }
        .match-result {
            font-size: 14px;
            color: var(--success);
            font-weight: 600;
            padding-top: 15px;
            border-top: 1px solid var(--card-border);
        }
        .loading-spinner {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            color: var(--text-secondary);
        }
        .loading-spinner i {
            font-size: 40px;
            color: var(--primary);
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .footer {
            background: #050505;
            border-top: 1px solid var(--card-border);
            margin-top: 50px;
            padding: 40px 20px;
            text-align: center;
        }
        @media (max-width: 768px) {
            .matches-grid {
                grid-template-columns: 1fr;
            }
            .match-teams {
                flex-direction: column;
                gap: 15px;
            }
            .team-second {
                flex-direction: row;
                text-align: left;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i class="fas fa-cricket"></i>
                <span>CricketPro</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="live.html">Live</a></li>
                <li><a href="fixtures.html">Fixtures</a></li>
                <li><a href="results.html" class="active">Results</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        <div class="page-header">
            <h1><i class="fas fa-history"></i> Match Results</h1>
        </div>
        
        <div id="results" class="matches-grid">
            <div class="loading-spinner">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Loading results...</p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2024 CricketPro - Live Cricket Scores</p>
    </footer>

    <script>
        const CONFIG = {
            API_KEY: '503f2570-73f0-4119-9305-669a6e43009c',
            BASE_URL: 'https://api.cricapi.com/v1'
        };

        const MOCK_RESULTS = [
            {
                name: "India vs Australia - 1st Test",
                matchType: "Test",
                status: "India won by 295 runs",
                teams: ["India", "Australia"],
                score: [
                    { r: 487, w: 10, o: 132.3 },
                    { r: 192, w: 10, o: 56.4 }
                ]
            },
            {
                name: "New Zealand vs England - 2nd ODI",
                matchType: "ODI",
                status: "New Zealand won by 8 wickets",
                teams: ["New Zealand", "England"],
                score: [
                    { r: 234, w: 9, o: 50.0 },
                    { r: 238, w: 2, o: 38.2 }
                ]
            }
        ];

        function getTeamLogo(team) {
            const logos = {
                "India": "https://flagcdn.com/w160/in.png",
                "Australia": "https://flagcdn.com/w160/au.png",
                "England": "https://flagcdn.com/w160/gb.png",
                "New Zealand": "https://flagcdn.com/w160/nz.png"
            };
            return logos[team] || "https://cdn-icons-png.flaticon.com/512/1099/1099784.png";
        }

        function createResultCard(match) {
            const teams = match.teams || match.name.split(' vs ');
            const team1 = teams[0];
            const team2 = teams[1];
            
            let score1 = { r: '-', w: '-' };
            let score2 = { r: '-', w: '-' };
            
            if (match.score && match.score[0]) {
                score1 = { r: match.score[0].r ?? '-', w: match.score[0].w ?? '-' };
            }
            if (match.score && match.score[1]) {
                score2 = { r: match.score[1].r ?? '-', w: match.score[1].w ?? '-' };
            }

            return `
                <div class="match-card">
                    <div class="match-header">
                        <span class="match-type">${match.matchType}</span>
                        <span>Yesterday</span>
                    </div>
                    <div class="match-teams">
                        <div class="team">
                            <img src="${getTeamLogo(team1)}" class="team-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1099/1099784.png'">
                            <div class="team-info">
                                <h3>${team1}</h3>
                                <span class="score">${score1.r}/${score1.w}</span>
                            </div>
                        </div>
                        <div class="vs-divider">VS</div>
                        <div class="team team-second">
                            <img src="${getTeamLogo(team2)}" class="team-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1099/1099784.png'">
                            <div class="team-info">
                                <h3>${team2}</h3>
                                <span class="score">${score2.r}/${score2.w}</span>
                            </div>
                        </div>
                    </div>
                    <p class="match-result"><i class="fas fa-trophy"></i> ${match.status}</p>
                </div>
            `;
        }

        async function loadResults() {
            try {
                const response = await fetch(`${CONFIG.BASE_URL}/matches?apikey=${CONFIG.API_KEY}`);
                const data = await response.json();
                
                let results;
                if (data.status === 'failure' || !data.data || data.data.length === 0) {
                    results = MOCK_RESULTS;
                } else {
                    results = data.data.filter(m => m.status && (m.status.toLowerCase().includes('won') || m.status.toLowerCase().includes('result')));
                    if (results.length === 0) results = MOCK_RESULTS;
                }
                
                const html = results.map(m => createResultCard(m)).join('');
                document.getElementById('results').innerHTML = html;
            } catch (e) {
                document.getElementById('results').innerHTML = MOCK_RESULTS.map(m => createResultCard(m)).join('');
            }
        }

        loadResults();
    </script>
</body>
</html>

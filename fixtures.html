<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixtures - CricketPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00d4ff;
            --secondary: #ff6b35;
            --dark: #0a0a0a;
            --card-bg: #111111;
            --card-border: #222222;
            --text: #ffffff;
            --text-secondary: #888888;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: var(--text);
            line-height: 1.6;
        }
        .navbar {
            background: rgba(17, 17, 17, 0.95);
            border-bottom: 1px solid var(--card-border);
            padding: 15px 20px;
        }
        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text);
            font-size: 20px;
            font-weight: 800;
        }
        .logo i {
            color: var(--primary);
        }
        .nav-links {
            display: flex;
            list-style: none;
            gap: 20px;
        }
        .nav-links a {
            text-decoration: none;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 14px;
        }
        .nav-links a.active {
            color: var(--primary);
        }
        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        .page-header {
            margin-bottom: 30px;
        }
        .page-header h1 {
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .matches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        .match-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 20px;
        }
        .match-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 12px;
            color: var(--text-secondary);
        }
        .match-type {
            background: rgba(0, 212, 255, 0.1);
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 15px;
            font-weight: 600;
        }
        .match-teams {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        .team {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }
        .team-second {
            flex-direction: row-reverse;
            text-align: right;
        }
        .team-logo {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--card-border);
            background: white;
        }
        .team-info h3 {
            font-size: 16px;
            font-weight: 700;
        }
        .vs-divider {
            width: 40px;
            height: 40px;
            background: var(--card-border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-secondary);
        }
        .match-status {
            font-size: 14px;
            color: var(--secondary);
            font-weight: 600;
        }
        .loading-spinner {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            color: var(--text-secondary);
        }
        .loading-spinner i {
            font-size: 40px;
            color: var(--primary);
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .footer {
            background: #050505;
            border-top: 1px solid var(--card-border);
            margin-top: 50px;
            padding: 40px 20px;
            text-align: center;
        }
        @media (max-width: 768px) {
            .matches-grid {
                grid-template-columns: 1fr;
            }
            .match-teams {
                flex-direction: column;
                gap: 15px;
            }
            .team-second {
                flex-direction: row;
                text-align: left;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i class="fas fa-cricket"></i>
                <span>CricketPro</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="live.html">Live</a></li>
                <li><a href="fixtures.html" class="active">Fixtures</a></li>
                <li><a href="results.html">Results</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        <div class="page-header">
            <h1><i class="fas fa-calendar-alt"></i> Upcoming Fixtures</h1>
        </div>
        
        <div id="fixtures" class="matches-grid">
            <div class="loading-spinner">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Loading fixtures...</p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2024 CricketPro - Live Cricket Scores</p>
    </footer>

    <script>
        const CONFIG = {
            API_KEY: '503f2570-73f0-4119-9305-669a6e43009c',
            BASE_URL: 'https://api.cricapi.com/v1'
        };

        const MOCK_FIXTURES = [
            {
                name: "Sri Lanka vs Bangladesh - 1st Test",
                matchType: "Test",
                status: "Tomorrow, 10:00 AM",
                teams: ["Sri Lanka", "Bangladesh"],
                date: new Date(Date.now() + 86400000).toISOString()
            },
            {
                name: "West Indies vs India - 1st ODI",
                matchType: "ODI",
                status: "Dec 28, 2:00 PM",
                teams: ["West Indies", "India"],
                date: new Date(Date.now() + 172800000).toISOString()
            },
            {
                name: "Australia vs England - Boxing Day Test",
                matchType: "Test",
                status: "Dec 26, 11:30 AM",
                teams: ["Australia", "England"],
                date: new Date(Date.now() + 259200000).toISOString()
            }
        ];

        function getTeamLogo(team) {
            const logos = {
                "India": "https://flagcdn.com/w160/in.png",
                "Australia": "https://flagcdn.com/w160/au.png",
                "England": "https://flagcdn.com/w160/gb.png",
                "Sri Lanka": "https://flagcdn.com/w160/lk.png",
                "Bangladesh": "https://flagcdn.com/w160/bd.png",
                "West Indies": "https://flagcdn.com/w160/wi.png"
            };
            return logos[team] || "https://cdn-icons-png.flaticon.com/512/1099/1099784.png";
        }

        function createFixtureCard(match) {
            const teams = match.teams || match.name.split(' vs ');
            const team1 = teams[0];
            const team2 = teams[1];

            return `
                <div class="match-card">
                    <div class="match-header">
                        <span class="match-type">${match.matchType}</span>
                        <span>${new Date(match.date).toLocaleDateString()}</span>
                    </div>
                    <div class="match-teams">
                        <div class="team">
                            <img src="${getTeamLogo(team1)}" class="team-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1099/1099784.png'">
                            <div class="team-info">
                                <h3>${team1}</h3>
                            </div>
                        </div>
                        <div class="vs-divider">VS</div>
                        <div class="team team-second">
                            <img src="${getTeamLogo(team2)}" class="team-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1099/1099784.png'">
                            <div class="team-info">
                                <h3>${team2}</h3>
                            </div>
                        </div>
                    </div>
                    <p class="match-status"><i class="fas fa-clock"></i> ${match.status}</p>
                </div>
            `;
        }

        async function loadFixtures() {
            try {
                const response = await fetch(`${CONFIG.BASE_URL}/matches?apikey=${CONFIG.API_KEY}`);
                const data = await response.json();
                
                let fixtures;
                if (data.status === 'failure' || !data.data || data.data.length === 0) {
                    fixtures = MOCK_FIXTURES;
                } else {
                    fixtures = data.data.filter(m => m.status && m.status.toLowerCase().includes('upcoming'));
                    if (fixtures.length === 0) fixtures = MOCK_FIXTURES;
                }
                
                const html = fixtures.map(m => createFixtureCard(m)).join('');
                document.getElementById('fixtures').innerHTML = html;
            } catch (e) {
                document.getElementById('fixtures').innerHTML = MOCK_FIXTURES.map(m => createFixtureCard(m)).join('');
            }
        }

        loadFixtures();
    </script>
</body>
</html>

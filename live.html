<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Matches - CricketPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00d4ff;
            --secondary: #ff6b35;
            --success: #00c851;
            --danger: #ff4444;
            --dark: #0a0a0a;
            --card-bg: #111111;
            --card-border: #222222;
            --text: #ffffff;
            --text-secondary: #888888;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: var(--text);
            line-height: 1.6;
        }
        .navbar {
            background: rgba(17, 17, 17, 0.95);
            border-bottom: 1px solid var(--card-border);
            padding: 15px 20px;
        }
        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text);
            font-size: 20px;
            font-weight: 800;
        }
        .logo i {
            color: var(--primary);
        }
        .nav-links {
            display: flex;
            list-style: none;
            gap: 20px;
        }
        .nav-links a {
            text-decoration: none;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 14px;
        }
        .nav-links a.active {
            color: var(--primary);
        }
        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        .page-header {
            margin-bottom: 30px;
        }
        .page-header h1 {
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .text-live {
            color: var(--danger);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .matches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        .match-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 20px;
            position: relative;
        }
        .match-card.live {
            border-color: rgba(255, 68, 68, 0.3);
        }
        .live-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--danger);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .pulse {
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            animation: pulse-dot 1.5s infinite;
        }
        @keyframes pulse-dot {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }
        .match-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 12px;
            color: var(--text-secondary);
        }
        .match-type {
            background: rgba(0, 212, 255, 0.1);
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 15px;
            font-weight: 600;
        }
        .match-teams {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        .team {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }
        .team-second {
            flex-direction: row-reverse;
            text-align: right;
        }
        .team-logo {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--card-border);
            background: white;
        }
        .team-info h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        .score {
            font-size: 20px;
            font-weight: 800;
            color: var(--primary);
        }
        .overs {
            font-size: 12px;
            color: var(--text-secondary);
        }
        .vs-divider {
            width: 40px;
            height: 40px;
            background: var(--card-border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-secondary);
        }
        .match-footer {
            border-top: 1px solid var(--card-border);
            padding-top: 15px;
        }
        .match-status {
            font-size: 14px;
            color: var(--text);
            font-weight: 600;
        }
        .loading-spinner {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            color: var(--text-secondary);
        }
        .loading-spinner i {
            font-size: 40px;
            color: var(--primary);
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .no-data {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
        .no-data i {
            font-size: 48px;
            margin-bottom: 15px;
        }
        .footer {
            background: #050505;
            border-top: 1px solid var(--card-border);
            margin-top: 50px;
            padding: 40px 20px;
            text-align: center;
        }
        @media (max-width: 768px) {
            .matches-grid {
                grid-template-columns: 1fr;
            }
            .match-teams {
                flex-direction: column;
                gap: 15px;
            }
            .team-second {
                flex-direction: row;
                text-align: left;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i class="fas fa-cricket"></i>
                <span>CricketPro</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="live.html" class="active">Live</a></li>
                <li><a href="fixtures.html">Fixtures</a></li>
                <li><a href="results.html">Results</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        <div class="page-header">
            <h1><i class="fas fa-circle text-live"></i> Live Matches</h1>
        </div>
        
        <div id="liveMatches" class="matches-grid">
            <div class="loading-spinner">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Loading live matches...</p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2024 CricketPro - Live Cricket Scores</p>
    </footer>

    <script>
        const CONFIG = {
            API_KEY: '503f2570-73f0-4119-9305-669a6e43009c',
            BASE_URL: 'https://api.cricapi.com/v1'
        };

        const MOCK_DATA = {
            liveMatches: [
                {
                    id: "1",
                    name: "India vs Australia - 2nd Test",
                    matchType: "Test",
                    status: "Live - Day 2",
                    teams: ["India", "Australia"],
                    score: [
                        { r: 326, w: 6, o: 89.4 },
                        { r: 195, w: 4, o: 52.0 }
                    ]
                },
                {
                    id: "2",
                    name: "England vs New Zealand - 3rd ODI",
                    matchType: "ODI",
                    status: "Live - England need 45 runs",
                    teams: ["England", "New Zealand"],
                    score: [
                        { r: 298, w: 8, o: 50.0 },
                        { r: 254, w: 5, o: 47.0 }
                    ]
                }
            ]
        };

        function getTeamLogo(team) {
            const logos = {
                "India": "https://flagcdn.com/w160/in.png",
                "Australia": "https://flagcdn.com/w160/au.png",
                "England": "https://flagcdn.com/w160/gb.png",
                "New Zealand": "https://flagcdn.com/w160/nz.png"
            };
            return logos[team] || "https://cdn-icons-png.flaticon.com/512/1099/1099784.png";
        }

        function createMatchCard(match) {
            const teams = match.teams || match.name.split(' vs ');
            const team1 = teams[0];
            const team2 = teams[1];
            
            let score1 = { r: '-', w: '-', o: '-' };
            let score2 = { r: '-', w: '-', o: '-' };
            
            if (match.score && match.score[0]) {
                score1 = {
                    r: match.score[0].r ?? '-',
                    w: match.score[0].w ?? '-',
                    o: match.score[0].o ?? '-'
                };
            }
            if (match.score && match.score[1]) {
                score2 = {
                    r: match.score[1].r ?? '-',
                    w: match.score[1].w ?? '-',
                    o: match.score[1].o ?? '-'
                };
            }

            return `
                <div class="match-card live">
                    <div class="live-badge"><span class="pulse"></span> LIVE</div>
                    <div class="match-header">
                        <span class="match-type">${match.matchType}</span>
                        <span>${new Date().toLocaleDateString()}</span>
                    </div>
                    <div class="match-teams">
                        <div class="team">
                            <img src="${getTeamLogo(team1)}" class="team-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1099/1099784.png'">
                            <div class="team-info">
                                <h3>${team1}</h3>
                                <span class="score">${score1.r}/${score1.w}</span>
                                <span class="overs">(${score1.o} ov)</span>
                            </div>
                        </div>
                        <div class="vs-divider">VS</div>
                        <div class="team team-second">
                            <img src="${getTeamLogo(team2)}" class="team-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1099/1099784.png'">
                            <div class="team-info">
                                <h3>${team2}</h3>
                                <span class="score">${score2.r}/${score2.w}</span>
                                <span class="overs">(${score2.o} ov)</span>
                            </div>
                        </div>
                    </div>
                    <div class="match-footer">
                        <p class="match-status">${match.status}</p>
                    </div>
                </div>
            `;
        }

        async function loadLiveMatches() {
            try {
                const response = await fetch(`${CONFIG.BASE_URL}/currentMatches?apikey=${CONFIG.API_KEY}&offset=0`);
                const data = await response.json();
                
                let matches;
                if (data.status === 'failure' || !data.data || data.data.length === 0) {
                    matches = MOCK_DATA.liveMatches;
                } else {
                    matches = data.data;
                }
                
                const html = matches.map(m => createMatchCard(m)).join('');
                document.getElementById('liveMatches').innerHTML = html;
            } catch (e) {
                document.getElementById('liveMatches').innerHTML = MOCK_DATA.liveMatches.map(m => createMatchCard(m)).join('');
            }
        }

        loadLiveMatches();
        setInterval(loadLiveMatches, 30000);
    </script>
</body>
</html>
